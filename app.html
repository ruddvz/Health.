<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#3DDB7A" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#2AB862" media="(prefers-color-scheme: light)" />
    <title>Health</title>
    <meta name="description" content="Offline-first personal health companion — meals, supplements, and habits on your device." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Health" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="icons/icon-152.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=Outfit:wght@400;500;600;700;800;900&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="css/tokens.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/onboarding.css" />
    <link rel="stylesheet" href="css/app.css" />
  </head>
  <body>
    <div class="app-layout">
      <div class="app-maincol">
        <div class="app-shell">
          <header class="app-top">
            <div class="app-title" id="app-name">.</div>
            <button type="button" class="icon-btn" id="settings-btn" aria-label="Settings">⚙</button>
          </header>
          <main class="page-stack" id="app-main"></main>
        </div>
      </div>
      <nav class="app-nav" aria-label="Main">
        <div class="app-nav-inner" id="bottom-nav"></div>
      </nav>
    </div>

    <div class="settings-panel" id="settings-panel">
      <div class="glass settings-sheet settings-sheet-wide">
        <h2 id="settings-title">Settings</h2>
        <p class="step-sub" id="settings-sub">Language & plan inputs</p>

        <div class="settings-block">
          <label class="label" for="edit-weight" id="lbl-weight">Current weight (kg)</label>
          <input class="field settings-field" type="number" id="edit-weight" step="0.1" min="30" max="300" />
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-train">Training days / week</span>
          <div class="train-day-grid" id="edit-train-days">
            <button type="button" class="train-day-btn glass" data-train="1">1</button>
            <button type="button" class="train-day-btn glass" data-train="2">2</button>
            <button type="button" class="train-day-btn glass" data-train="3">3</button>
            <button type="button" class="train-day-btn glass" data-train="4">4</button>
            <button type="button" class="train-day-btn glass" data-train="5">5</button>
            <button type="button" class="train-day-btn glass" data-train="6">6</button>
            <button type="button" class="train-day-btn glass" data-train="7">7</button>
          </div>
        </div>

        <div class="settings-block">
          <label class="label" for="edit-city" id="lbl-city">City (grocery tips)</label>
          <input class="field settings-field" type="text" id="edit-city" maxlength="80" placeholder="" />
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-prefs">App preferences</span>
          <p class="step-sub" id="settings-prefs-sub"></p>
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-theme">Theme</span>
          <div class="train-day-grid" id="theme-grid">
            <button type="button" class="train-day-btn glass" data-theme="dark">Dark</button>
            <button type="button" class="train-day-btn glass" data-theme="light">Light</button>
            <button type="button" class="train-day-btn glass" data-theme="auto">Auto</button>
          </div>
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-units">Units</span>
          <div class="train-day-grid" id="units-grid">
            <button type="button" class="train-day-btn glass" data-units="metric">Metric</button>
            <button type="button" class="train-day-btn glass" data-units="imperial">Imperial</button>
          </div>
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-weekstart">Week starts</span>
          <div class="train-day-grid" id="weekstart-grid">
            <button type="button" class="train-day-btn glass" data-weekstart="monday">Mon</button>
            <button type="button" class="train-day-btn glass" data-weekstart="sunday">Sun</button>
          </div>
        </div>

        <div class="settings-block">
          <label class="label" for="edit-water-goal" id="lbl-water-goal">Water goal (glasses)</label>
          <input class="field settings-field" type="number" id="edit-water-goal" min="4" max="16" step="1" />
        </div>

        <div class="settings-block">
          <label class="label" for="edit-cal-override" id="lbl-cal-override">Calorie goal override</label>
          <input class="field settings-field" type="number" id="edit-cal-override" min="800" max="6000" step="50" placeholder="" />
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-macro-ov">Macro overrides (g)</span>
          <p class="step-sub" id="settings-macro-hint"></p>
          <div class="settings-inline-row">
            <label class="label settings-macro-lbl" for="macro-p" id="lbl-macro-p">P</label>
            <input class="field settings-field" type="number" id="macro-p" min="0" max="500" step="1" placeholder="—" />
            <label class="label settings-macro-lbl" for="macro-c" id="lbl-macro-c">C</label>
            <input class="field settings-field" type="number" id="macro-c" min="0" max="800" step="1" placeholder="—" />
            <label class="label settings-macro-lbl" for="macro-f" id="lbl-macro-f">F</label>
            <input class="field settings-field" type="number" id="macro-f" min="0" max="300" step="1" placeholder="—" />
          </div>
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-reminder-times">Reminder times</span>
          <p class="step-sub" id="settings-reminder-hint"></p>
          <div id="settings-reminder-list" class="settings-reminder-list"></div>
        </div>

        <div class="settings-block">
          <label class="label" for="edit-currency" id="lbl-currency">Currency</label>
          <select class="field settings-field" id="edit-currency">
            <option value="NONE">None</option>
            <option value="INR">INR ₹</option>
            <option value="USD">USD $</option>
            <option value="EUR">EUR €</option>
            <option value="GBP">GBP £</option>
          </select>
        </div>

        <div class="settings-block">
          <button type="button" class="btn btn-outline" id="settings-notify-btn"></button>
          <p class="step-sub" id="settings-notify-hint"></p>
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-about">About</span>
          <p class="step-sub" id="settings-about-body"></p>
        </div>

        <div class="settings-block">
          <span class="label" id="lbl-lang">Language</span>
          <div class="lang-grid settings-lang-grid">
            <button type="button" class="glass lang-card" data-set-lang="en"><h2>English</h2></button>
            <button type="button" class="glass lang-card" data-set-lang="hi"><h2>Hinglish</h2></button>
            <button type="button" class="glass lang-card" data-set-lang="gu"><h2>Gujlish</h2></button>
          </div>
        </div>

        <div class="settings-block settings-block--data">
          <span class="label" id="lbl-data">Your data</span>
          <p class="step-sub settings-data-hint" id="settings-data-hint"></p>
          <div class="data-actions">
            <button type="button" class="btn btn-outline" id="data-export"></button>
            <button type="button" class="btn btn-outline" id="data-import-btn"></button>
            <input type="file" id="data-import-file" accept="application/json,.json" hidden />
            <button type="button" class="btn btn-ghost data-danger" id="data-clear-btn"></button>
          </div>
        </div>

        <div class="footer-actions settings-footer">
          <button type="button" class="btn btn-primary" id="settings-save">Save changes</button>
          <button type="button" class="btn btn-ghost" id="settings-close">Close</button>
        </div>
      </div>
    </div>

    <div class="modal-root" id="clear-data-modal" hidden>
      <div class="modal-root__backdrop" data-close-clear-modal></div>
      <div class="glass modal-root__sheet" role="dialog" aria-modal="true" aria-labelledby="clear-modal-title">
        <h3 class="modal-root__title" id="clear-modal-title"></h3>
        <p class="step-sub" id="clear-modal-body"></p>
        <label class="label" for="clear-data-input" id="clear-modal-input-lbl"></label>
        <input class="field" type="text" id="clear-data-input" autocomplete="off" />
        <div class="footer-actions modal-root__actions">
          <button type="button" class="btn btn-ghost" id="clear-data-cancel"></button>
          <button type="button" class="btn btn-primary" id="clear-data-confirm" disabled></button>
        </div>
      </div>
    </div>

    <script type="module" src="js/app.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("sw.js").catch(() => {});
        });
      }
    </script>
  </body>
</html>
