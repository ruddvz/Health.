<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta
			name="viewport"
			content="width=device-width, initial-scale=1, viewport-fit=cover"
		/>
		<meta name="theme-color" content="#0b0b0b" />
		<title>Offline — Health</title>
		<style>
			*,
			*::before,
			*::after {
				box-sizing: border-box;
			}
			body {
				margin: 0;
				min-height: 100dvh;
				display: flex;
				align-items: center;
				justify-content: center;
				padding: 24px;
				padding-bottom: calc(24px + env(safe-area-inset-bottom, 0px));
				padding-top: calc(24px + env(safe-area-inset-top, 0px));
				font-family:
					ui-sans-serif,
					system-ui,
					-apple-system,
					'Segoe UI',
					sans-serif;
				background:
					radial-gradient(circle at 1px 1px, rgba(255, 255, 255, 0.065) 1px, transparent 0),
					#0b0b0b;
				background-size: 18px 18px;
				color: #f4f4f0;
				text-align: center;
			}
			.card {
				max-width: 320px;
				border: 1px solid rgba(255, 255, 255, 0.1);
				border-radius: 18px;
				padding: 28px 22px;
				background: #121212;
			}
			h1 {
				margin: 0 0 10px;
				font-size: 12px;
				font-weight: 600;
				letter-spacing: 0.28em;
				text-transform: uppercase;
				font-family: ui-monospace, 'SF Mono', monospace;
				color: #ff2a2a;
			}
			p {
				margin: 0;
				font-size: 15px;
				line-height: 1.5;
				color: #b9b9b2;
			}
		</style>
	</head>
	<body>
		<div class="card">
			<h1>Offline</h1>
			<p>No network. Your plan stays on this device — reconnect to refresh the app shell.</p>
		</div>
	</body>
</html>
