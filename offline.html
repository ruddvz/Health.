<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0F0D" />
    <title>Offline — Health</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        font-family: system-ui, -apple-system, sans-serif;
        background: #0a0f0d;
        color: #f2f7f4;
        text-align: center;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 700;
        margin: 0 0 12px;
        color: #3ddb7a;
      }
      p {
        margin: 0;
        line-height: 1.55;
        color: #8fa897;
        max-width: 320px;
      }
    </style>
  </head>
  <body>
    <div>
      <h1>You are offline</h1>
      <p>Health keeps your data on this device. Connect to the internet once, open the app, then everything works without a connection.</p>
    </div>

</html>
